<!DOCTYPE html>
<html lang="sk">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>UML Quiz 1 - Úvod</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
.question { padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; }
.correct { background:#d4edda; }
.wrong { background:#f8d7da; }
label { display:block; margin:4px 0; }
button { padding:10px 18px; font-size:16px; cursor:pointer; }
#result { margin-top:20px; font-size:18px; font-weight:bold; }
</style>
</head>
<body>

<h2>UML Quiz 1 - Úvod</h2>

<div id="quiz"></div>
<button type="button" onclick="checkAnswers()">Vyhodnotiť</button>

<button type="button" onclick="location.href='index.html'">
    Späť na hlavnú stránku
</button>
<div id="result"></div>

<script>
const questions = [
{q:"UML je určený na implementáciu softvérových systémov?",options:["Pravda","Nepravda","UML je len testovanie","UML je programovací jazyk"],correct:[1],multi:false},
{q:"REUSE znamená:",options:["Znovupoužiteľnosť","Jednorazové použitie","Optimalizácia databáz","Kompilácia kódu"],correct:[0],multi:false},
{q:"Koľko UML diagramov existuje?",options:["12","13","10","15"],correct:[1],multi:false},
{q:"UML je implementačne nezávislý jazyk",options:["Pravda","Nepravda","Závislý od Javy","Závislý od Windows"],correct:[0],multi:false},
{q:"Medzi princípy modelovania patrí:",options:["Výber správnych modelov","Rôzne úrovne abstrakcie","Len kódovanie bez modelu","Automatické UML bez analýzy"],correct:[0,1],multi:true},
{q:"Sémantika UML určuje význam prvkov",options:["Pravda","Nepravda","Len kód","Len DB"],correct:[0],multi:false},
{q:"Koľko diagramov je nutné použiť?",options:["Všetky","Len potrebné","Náhodné","Žiadne"],correct:[1],multi:false},
{q:"Veta v UML je:",options:["Jednoduchý diagram","Java trieda","Databáza","XML súbor"],correct:[0],multi:false},
{q:"Softvérový model je:",options:["Abstrakcia systému","Súhrn pohľadov","Zdrojový kód","Hardvér"],correct:[0,1],multi:true}
];

function shuffle(a){return a.sort(()=>Math.random()-0.5);}

function render(){
const c=document.getElementById("quiz");
c.innerHTML="";
shuffle(questions).forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";
let opts=shuffle(q.options.map((o,idx)=>({o,idx}))).map(opt=>
`<label><input type='${q.multi?"checkbox":"radio"}' name='q${i}' value='${opt.idx}'> ${opt.o}</label>`
).join("");

div.innerHTML=`<p>${q.q}</p>`+opts;
div.dataset.correct=JSON.stringify(q.correct);
c.appendChild(div);
});
}

function checkAnswers(){
let score=0;
document.querySelectorAll(".question").forEach(div=>{
let correct=JSON.parse(div.dataset.correct);
let inputs=div.querySelectorAll("input");
let selected=[];
inputs.forEach(i=>{if(i.checked) selected.push(parseInt(i.value));});

let ok=JSON.stringify(selected.sort())===JSON.stringify(correct.sort());

div.classList.remove("correct","wrong");

if(ok){score++; div.classList.add("correct");}
else{
div.classList.add("wrong");
inputs.forEach(i=>{
if(correct.includes(parseInt(i.value))){i.parentElement.style.background="#d4edda";}
});
}
});

document.getElementById("result").innerText=`Výsledok: ${score} / 9`;
}

render();
</script>

</body>
</html>
