function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}

function loadQuiz(){
const container=document.getElementById("quiz");
shuffle(questions).forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";
div.dataset.answer = q.correct.join(",");
div.dataset.multi = q.multi ? "true" : "false";

let html=`<p><b>${i+1}. ${q.q}</b></p>`;
q.options.forEach((opt,idx)=>{
html+=`<label class="option">
<input type="checkbox" name="q${i}" value="${idx}"> ${opt}
</label>`;
});
div.innerHTML=html;
container.appendChild(div);
});
}

function evaluateQuiz(){
let score=0;
let questionsDiv=document.querySelectorAll(".question");

questionsDiv.forEach(div=>{
let correct=div.dataset.answer.split(",").map(Number);
let selected=[...div.querySelectorAll("input:checked")].map(x=>Number(x.value));

let isCorrect = JSON.stringify(correct.sort()) === JSON.stringify(selected.sort());

if(isCorrect){
div.classList.add("correct");
score++;
}else{
div.classList.add("wrong");
div.querySelectorAll("input").forEach(inp=>{
if(correct.includes(Number(inp.value))){
inp.parentElement.style.background="#c8f7c5";
}
});
}
});

document.getElementById("result").innerText=
`Výsledok: ${score} / ${questionsDiv.length}`;
}

loadQuiz();
</script>
