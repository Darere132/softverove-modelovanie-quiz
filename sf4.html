<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>UML Quiz 4 - Stavový diagram</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
.question { padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; }
.correct { background:#d4edda; }
.wrong { background:#f8d7da; }
label { display:block; margin:4px 0; }
button { padding:10px 18px; font-size:16px; cursor:pointer; }
#result { margin-top:20px; font-size:18px; font-weight:bold; }
</style>
</head>
<body>

<h2>UML Quiz 4 – Stavový diagram</h2>

<div id="quiz"></div>
<button onclick="checkAnswers()">Vyhodnotiť</button>
<div id="result"></div>

<script>
const questions = [
{q:"1. V stavovom diagrame môže byť:", options:["Dva koncové stavy","Jeden koncový stav","Jeden počiatočný stav","Žiadny stav"], correct:[0,1,2], multi:true},

{q:"2. Spúšťacia udalosť (event trigger) začínajúca slovom when:", options:["Označuje tzv. change udalosť","Označuje udalosť vyhodnocovanú kontinuálne","UI udalosť","Chybu"], correct:[0,1], multi:true},

{q:"3. Modelovanie stavov:", options:["Je súčasťou modelovania správania","Je databáza","Je UI","Je kód"], correct:[0], multi:true},

{q:"4. Slovo do v stave označuje:", options:["Príkaz na vykonanie aktivity v stave","Prechod","Atribút","Metódu"], correct:[0], multi:true},

{q:"5. Slovo defer v stavovom diagrame používame na označenie:", options:["Odloženej udalosti","Zmazanej udalosti","Aktívnej udalosti","Chyby"], correct:[0], multi:false},

{q:"6. History stav nám umožňuje:", options:["Návrat do posledného aktívneho substavu v sekvenčných substavoch","Reset systému","Zmazanie stavov","UI návrat"], correct:[0], multi:true},

{q:"7. Entry efekt sa vykoná:", options:["Pri každom vstupe do stavu","Pri self prechode v stave","Pri výstupe","Nikdy"], correct:[0,1], multi:true},

{q:"8. Prechod medzi stavmi sa môže popisovať:", options:["Udalosťou","Udalosť/akcia","Atribútom","Triedou"], correct:[0,1], multi:true},

{q:"9. Stav v stavovom diagrame:", options:["Popisuje konkrétnu situáciu, v ktorej sa prvok nachádza počas svojho životného cyklu","Metóda","Diagram","DB tabuľka"], correct:[0], multi:true},

{q:"10. Zložený stav (composite state):", options:["Musí obsahovať súbežné (orthogonal) alebo sekvenčné (nonorthogonal) substavy","Je vždy prázdny","Nemá stav","Je metóda"], correct:[0], multi:false},

{q:"11. Prechod vzplanie, stane sa aktívnym:", options:["Aj keď sa nič nestane","Ak nastane spúšťacia udalosť (event trigger)","Náhodne","UI klikom vždy"], correct:[0,1], multi:true},

{q:"12. Stavový diagram:", options:["Musí mať jeden počiatočný stav","Môže v jednom stave popisovať aj stavy iných prvkov systému","Nemá stav","Je databáza"], correct:[0,1], multi:true},

{q:"13. Exit efekt sa vykoná:", options:["Pri každom opustení stavu","Pri self prechode v stave","Pri ničnerobení","Len UI"], correct:[0,1], multi:true},

{q:"14. Automatický prechod:", options:["Nemá spúšťaciu udalosť a nemusí mať efekt","Musí mať event","Nemá stav","Je chyba"], correct:[0], multi:true},

{q:"15. Označte správne poradie častí prechodu v UML:", options:["Spúšťacia udalosť / efekt","effect/event/guard","Spúšťacia udalosť [ochranná podmienka]","random"], correct:[0,2], multi:true},

{q:"16. Stavový diagram zvyčajne:", options:["Popisuje správanie jedného prvku systému","Popisuje stavy jedného prvku systému","Popisuje UI","Popisuje sieť"], correct:[0,1], multi:true},

{q:"17. Prechod ukazuje vzťah:", options:["Aj od toho istého stavu","Aj medzi dvoma rôznymi stavmi","Len triedy","Len UI"], correct:[0,1], multi:true},

{q:"18. Stavový diagram patrí medzi:", options:["Diagramy správania","Štrukturálne","DB","Kódové"], correct:[0], multi:true},

{q:"19. Akcia v stavovom diagrame:", options:["Reaguje na udalosť","Môže byť adresovaná inému prvku","Je DB","Je trieda"], correct:[0,1], multi:true},

{q:"20. Udalosť v stavovom diagrame:", options:["Môže mať parametre","Popisuje príjem požiadavky","Je tabuľka","Je trieda"], correct:[0,1], multi:true}
];

function shuffle(a){return a.sort(()=>Math.random()-0.5);}

function render(){
const c=document.getElementById("quiz");
c.innerHTML="";
shuffle(questions).forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";
let opts=shuffle(q.options.map((o,idx)=>({o,idx}))).map(opt=>
`<label><input type='${q.multi?"checkbox":"radio"}' name='q${i}' value='${opt.idx}'> ${opt.o}</label>`
).join("");

div.innerHTML=`<p>${q.q}</p>`+opts;
div.dataset.correct=JSON.stringify(q.correct);
c.appendChild(div);
});
}

function checkAnswers(){
let score=0;
document.querySelectorAll(".question").forEach(div=>{
let correct=JSON.parse(div.dataset.correct);
let inputs=div.querySelectorAll("input");
let selected=[];
inputs.forEach(i=>{if(i.checked) selected.push(parseInt(i.value));});

let ok=JSON.stringify(selected.sort())===JSON.stringify(correct.sort());

div.classList.remove("correct","wrong");

if(ok){score++; div.classList.add("correct");}
else{
div.classList.add("wrong");
inputs.forEach(i=>{
if(correct.includes(parseInt(i.value))){i.parentElement.style.background="#d4edda";}
});
}
});

document.getElementById("result").innerText=`Výsledok: ${score} / 20`;
}

render();
</script>

</body>
</html>
