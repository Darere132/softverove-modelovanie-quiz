<!DOCTYPE html>
<html lang="sk">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>SF Quiz 8 - Komponenty a nasadenie</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
.question { padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; }
.correct { background:#d4edda; }
.wrong { background:#f8d7da; }
label { display:block; margin:4px 0; }
button { padding:10px 18px; font-size:16px; cursor:pointer; }
#result { margin-top:20px; font-size:18px; font-weight:bold; }
</style>
</head>
<body>

<h2>SF Quiz 8 – Komponenty a nasadenie</h2>

<div id="quiz"></div>
<button type="button" onclick="checkAnswers()">Vyhodnotiť</button>

<button type="button" onclick="location.href='index.html'">
    Späť na hlavnú stránku
</button>
<div id="result"></div>

<script>
const questions = [
{q:"1. Logické veci modelujeme pomocou", options:["tried","artefaktov popisujúcich fyzickú implementáciu","uzlov infraštruktúry","komponentov runtime architektúry"], correct:[0], multi:true},
{q:"2. Fyzické veci modelujeme pomocou", options:["artefaktov","tried doménového modelu","use case scenárov","stavových diagramov"], correct:[0], multi:true},
{q:"3. Artefakty", options:["nemôžu mať atribúty","nemôžu mať operácie","obsahujú UI logiku","sú aktéri systému"], correct:[0,1], multi:true},
{q:"4. Zdrojové kódy patria medzi artefakty", options:["produktové","behaviorálne artefakty","stavové artefakty","interakčné diagramy"], correct:[0], multi:true},
{q:"5. Uzol je", options:["fyzický prvok existujúci počas behu programu","logická trieda v doménovom modeli","metóda objektu","atribút triedy"], correct:[0], multi:true},
{q:"6. Dva základné typy uzlov sú", options:["procesor a zariadenie","entita a relácia","UI vrstva a databáza","stav a prechod"], correct:[0], multi:true},
{q:"7. DEPLOY závislosť popisuje vzťah medzi", options:["uzlom a artefaktom","triedou a jej metódou","use case a scenárom","stavom a prechodom"], correct:[0], multi:true},
{q:"8. Tenký klient slúži na", options:["zobrazenie informácií","vykonávanie všetkých výpočtov servera","správu databázových transakcií","kompiláciu zdrojového kódu"], correct:[0], multi:true},
{q:"9. Interaction overview diagram môže obsahovať", options:["sekvenčný diagram","class diagram","use case diagram","deployment diagram"], correct:[0], multi:true}
];

questions.forEach(q => {
  q.q = q.q.replace(/^\d+\.\s*/, "");
});

function shuffle(a){return a.sort(()=>Math.random()-0.5);}

function render(){
const c=document.getElementById("quiz");
c.innerHTML="";
shuffle(questions).forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";
let opts=shuffle(q.options.map((o,idx)=>({o,idx}))).map(opt=>
`<label><input type='${q.multi?"checkbox":"radio"}' name='q${i}' value='${opt.idx}'> ${opt.o}</label>`
).join("");

div.innerHTML=`<p><b>${i+1}.</b> ${q.q}</p>`+opts;
div.dataset.correct=JSON.stringify(q.correct);
c.appendChild(div);
});
}

function checkAnswers(){
let score=0;
document.querySelectorAll(".question").forEach(div=>{
let correct=JSON.parse(div.dataset.correct);
let inputs=div.querySelectorAll("input");
let selected=[];
inputs.forEach(i=>{if(i.checked) selected.push(parseInt(i.value));});

let ok=JSON.stringify(selected.sort())===JSON.stringify(correct.sort());

div.classList.remove("correct","wrong");

if(ok){score++; div.classList.add("correct");}
else{
div.classList.add("wrong");
inputs.forEach(i=>{
if(correct.includes(parseInt(i.value))){i.parentElement.style.background="#d4edda";}
});
}
});

document.getElementById("result").innerText=`Výsledok: ${score} / 9`;
}

render();
</script>

</body>
</html>
