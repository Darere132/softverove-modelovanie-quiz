<!DOCTYPE html>
<html lang="sk">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>SF Quiz 5 - Interakcie</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
.question { padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; }
.correct { background:#d4edda; }
.wrong { background:#f8d7da; }
label { display:block; margin:4px 0; }
button { padding:10px 18px; font-size:16px; cursor:pointer; }
#result { margin-top:20px; font-size:18px; font-weight:bold; }
</style>
</head>
<body>

<h2>SF Quiz 5 – Modelovanie interakcií</h2>

<div id="quiz"></div>
<button type="button" onclick="checkAnswers()">Vyhodnotiť</button>

<button type="button" onclick="location.href='index.html'">
    Späť na hlavnú stránku
</button>
<div id="result"></div>

<script>
const questions = [
{q:"1. Vzťah medzi interakciou a prípadom použitia môže byť:", options:["Interakcia je realizáciou prípadu použitia","Use case je realizáciou interakcie","Interakcia je databáza","Interakcia je implementačný kód systému"], correct:[0], multi:true},
{q:"2. Pre znázornenie interakcií medzi dvoma prvkami interakcie použijeme diagram:", options:["Sekvenčný diagram","Triedny diagram","ER diagram","Diagram komponentov"], correct:[0], multi:true},
{q:"3. CRC karty slúžia na:", options:["Znázornenie zodpovednosti a spolupráce prvkov","Popis rolí tried v systéme","Databázové modelovanie","Definovanie algoritmov"], correct:[0], multi:true},
{q:"4. Znak * pred hranatými zátvorkami v komunikácii označuje:", options:["Opakovanie – iteráciu","Deklaráciu premennej","Volanie metódy","Identifikátor triedy"], correct:[0], multi:true},
{q:"5. Komunikačný diagram:", options:["Dáva dôraz na zobrazenie štrukturálnych vzťahov medzi prvkami","Zobrazuje postupnosť správ medzi prvkami","Popisuje databázové relácie","Zachytáva používateľské rozhranie"], correct:[0,1], multi:true},
{q:"6. Poradie komunikácií v sekvenčnom diagrame:", options:["Je reprezentované vertikálnou osou","Môžeme určiť aj iným spôsobom (napr. číslovaním správ)","Je určené len graficky bez pravidiel","Nie je explicitne definované"], correct:[0,1], multi:true},
{q:"7. Reflexná komunikácia:", options:["Označuje správu poslanú od prvku k nemu samému","Interné volanie metódy objektu","Externé volanie systému","Signál medzi dvoma triedami"], correct:[0], multi:true},
{q:"8. Čiara života:", options:["Sa používa v sekvenčnom diagrame","Smeruje vertikálne od prvku dole","Reprezentuje objekt v čase","Zobrazuje životný cyklus triedy"], correct:[0,1], multi:true},
{q:"9. Komunikácia (správa) v komunikačnom diagrame:", options:["Môže obsahovať tzv. dot notáciu","Môže obsahovať číslo označujúce jej poradie","Môže obsahovať iteráciu","Môže obsahovať podmienky vykonania"], correct:[0,1,2], multi:true},
{q:"10. Rola v interakcii:", options:["Definuje použitie inštancie triedy v interakcii","Určuje funkciu objektu v konkrétnom scenári","Popisuje databázový záznam","Definuje UI prvok"], correct:[0], multi:true},
{q:"11. Komunikácia medzi prvkami v sekvenčnom diagrame:", options:["Je zobrazená ako plná čiara so šípkou","Môže obsahovať podmienku","Je jednosmerná alebo obojsmerná","Zachytáva výmenu správ"], correct:[0,1], multi:true},
{q:"12. Označte správne tvrdenia:", options:["Interakcia je množina správ medzi prvkami","Spolupráca (collaboration) je kolekcia tried, ich správ a ich asociácií","Interakcia popisuje dynamické správanie systému","Spolupráca definuje statickú štruktúru objektov"], correct:[0,1], multi:true},
{q:"13. Iterácia sa v komunikácii (správe) označuje:", options:["Hviezdičkou a hranatými zátvorkami *[iterácia]","#loop","@repeat","cyklus bez označenia"], correct:[0], multi:true},
{q:"14. Poradie komunikácií v komunikačnom diagrame:", options:["Môžeme zistiť inak","Určuje sa pomocou číslovania správ","Je implicitne dané smermi šípok","Nie je dôležité"], correct:[0], multi:true},
{q:"15. Dot notácia:", options:["Slúži na zobrazenie rôznych úrovní komunikácie","Umožňuje hierarchické pomenovanie správ","Je spôsob zápisu objektov","Je forma UML zápisu tried"], correct:[0], multi:true},
{q:"16. Sekvenčný diagram znázorňuje podobné informácie ako:", options:["Komunikačný diagram","Diagram spolupráce","Diagram aktivít","Stavový diagram"], correct:[0], multi:true},
{q:"17. Sekvenčný diagram slúži na zobrazenie:", options:["Ako na seba vzájomne pôsobia prvky v čase","Dynamiky systému počas vykonávania","Dátových štruktúr","Statických vzťahov tried"], correct:[0], multi:true},
{q:"18. Aktivácia:", options:["Reprezentuje časovú periódu, počas ktorej prvok vykonáva operáciu","Sa používa v sekvenčnom diagrame","Zachytáva vykonávanie metódy","Reprezentuje beh procesu"], correct:[0,1], multi:true},
{q:"19. Pri modelovaní interakcií sa posielajú správy:", options:["Aj synchrónne aj asynchrónne","Synchrónne volania","Asynchrónne signály","Blokujúce volania"], correct:[0], multi:true},
{q:"20. Operátory riadenia (control operators) slúžia na modelovanie:", options:["Cyklu","Možnosti výberu postupnosti správ","Vetvenia logiky","Podmienok vykonania interakcie"], correct:[0,1], multi:true},
{q:"21. Rola triedy (class role) v interakcii:", options:["Definuje konkrétne použitie objektu triedy v interakcii","Určuje kontext objektu v scenári","Je databázová entita","Je typ UI komponentu"], correct:[0], multi:true},
{q:"22. V hranatých zátvorkách môže byť v sekvenčnom diagrame:", options:["Počet opakovaní – iterácia","Podmienka interakcie","Guard podmienka","Logický výraz"], correct:[0,1], multi:true},
{q:"23. Pre znázornenie vzťahov a interakcií medzi prvkami interakcie použijeme diagram:", options:["Komunikačný diagram","Sekvenčný diagram","Diagram aktivít","Diagram tried"], correct:[0], multi:true},
{q:"24. Modelovanie interakcií je:", options:["Špeciálny prípad modelovania správania","Súčasť behaviorálneho modelovania","Statické modelovanie","Databázové modelovanie"], correct:[0], multi:true},
{q:"25. CRC karty slúžia na:", options:["Hľadanie zodpovednosti danej triedy","Analýzu spolupráce objektov","Návrh databázy","Definovanie UI"], correct:[0], multi:true},
{q:"26. Princíp CRC pri vytváraní balíčkov znamená, že do jedného balíčka dávame triedy ktoré:", options:["Sú spolu znovupoužiteľné","Sú silno súvisiace z hľadiska zodpovednosti","Sú náhodne zoskupené","Patria do rovnakého UI modulu"], correct:[0], multi:true},
{q:"27. Nahraditeľnosť sa:", options:["Môže realizovať pomocou dedičnosti","Zabezpečuje polymorfizmom","Realizuje kompozíciou","Nie je súčasť UML"], correct:[0], multi:true}
];

questions.forEach(q => {
  q.q = q.q.replace(/^\d+\.\s*/, "");
});

function shuffle(a){return a.sort(()=>Math.random()-0.5);}

function render(){
const c=document.getElementById("quiz");
c.innerHTML="";
shuffle(questions).forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";
let opts=shuffle(q.options.map((o,idx)=>({o,idx}))).map(opt=>
`<label><input type='${q.multi?"checkbox":"radio"}' name='q${i}' value='${opt.idx}'> ${opt.o}</label>`
).join("");

div.innerHTML=`<p><b>${i+1}.</b> ${q.q}</p>`+opts;
div.dataset.correct=JSON.stringify(q.correct);
c.appendChild(div);
});
}

function checkAnswers(){
let score=0;
document.querySelectorAll(".question").forEach(div=>{
let correct=JSON.parse(div.dataset.correct);
let inputs=div.querySelectorAll("input");
let selected=[];
inputs.forEach(i=>{if(i.checked) selected.push(parseInt(i.value));});

let ok=JSON.stringify(selected.sort())===JSON.stringify(correct.sort());

div.classList.remove("correct","wrong");

if(ok){score++; div.classList.add("correct");}
else{
div.classList.add("wrong");
inputs.forEach(i=>{
if(correct.includes(parseInt(i.value))){i.parentElement.style.background="#d4edda";}
});
}
});

document.getElementById("result").innerText=`Výsledok: ${score} / 27`;
}

render();
</script>

</body>
</html>
