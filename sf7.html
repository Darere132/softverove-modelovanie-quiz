<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>UML Quiz 7 - OCL</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
.question { padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; }
.correct { background:#d4edda; }
.wrong { background:#f8d7da; }
label { display:block; margin:4px 0; }
button { padding:10px 18px; font-size:16px; cursor:pointer; }
#result { margin-top:20px; font-size:18px; font-weight:bold; }
</style>
</head>
<body>

<h2>UML Quiz 7 – OCL</h2>

<div id="quiz"></div>
<button onclick="checkAnswers()">Vyhodnotiť</button>
<div id="result"></div>

<script>
const questions = [
{q:"1. Operácia bez vedľajších účinkov", options:["Nemôže modifikovať atribúty objektu","Mení stav objektu","Mení triedu","Je UI operácia"], correct:[0], multi:false},

{q:"2. Kľúčové slovo derive označuje", options:["OCL výraz pre odvodenie hodnoty atribútu","UI prvok","DB index","Triedu"], correct:[0], multi:false},

{q:"3. Skratka OCL znamená", options:["Object Constraint Language","Object Class Layer","Operational Code Language","Open Constraint Logic"], correct:[0], multi:false},

{q:"4. Medzi základné preddefinované typy nepatrí", options:["Char","Integer","Boolean","Real"], correct:[0], multi:false},

{q:"5. Pre násobnosť v OCL vzťahu medzi prvkami väčšiu ako 1", options:["Používame v OCL výraze odkaz cez ->","Môžeme použiť operáciu select","for loop","SQL join"], correct:[0,1], multi:true},

{q:"6. Jazyk OCL môžeme použiť", options:["Pri písaní pre a post podmienok pre operácie","Pri písaní odvodených pravidiel pre atribúty","UI návrh","DB schéma"], correct:[0,1], multi:true},

{q:"7. OCL výraz", options:["Je bez vedľajších účinkov","Je mutabilný","Je UI prvok","Je kód"], correct:[0], multi:false},

{q:"8. Pri vytváraní OCL výrazov pre reťazce môžeme použiť operátor", options:["<>","=","+ len","SQL LIKE"], correct:[0,1], multi:true},

{q:"9. Kľúčové slovo body označuje výraz", options:["Pre telo operácie","Atribút","Triedu","Diagram"], correct:[0], multi:false},

{q:"10. Operátory +-*/ sú používané ako", options:["Infix operátory","Prefix","Postfix","UI operátory"], correct:[0], multi:false},

{q:"11. Prístup k atribútom inej triedy v OCL výraze", options:["Je povolený k public atribútom","Je zakázaný k private atribútom","Vždy zakázaný","Len UI"], correct:[0,1], multi:true},

{q:"12. Pojem invariant", options:["Označuje OCL výraz, ktorý má vždy hodnotu true","UI stav","DB tabuľka","Metóda"], correct:[0], multi:false},

{q:"13. Kľúčové slovo post označuje", options:["Výraz pre ukončenie operácie","Začiatok","UI event","DB commit"], correct:[0], multi:false},

{q:"14. Jazyk OCL je", options:["Typový jazyk","Formálny jazyk","UI jazyk","DB jazyk"], correct:[0,1], multi:true},

{q:"15. Kľúčové slovo self odkazuje v OCL výraze na", options:["Kontextovú inštanciu v OCL","Inú triedu","DB","UI"], correct:[0], multi:false}
];

function shuffle(a){return a.sort(()=>Math.random()-0.5);}

function render(){
const c=document.getElementById("quiz");
c.innerHTML="";
shuffle(questions).forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";
let opts=shuffle(q.options.map((o,idx)=>({o,idx}))).map(opt=>
`<label><input type='${q.multi?"checkbox":"radio"}' name='q${i}' value='${opt.idx}'> ${opt.o}</label>`
).join("");

div.innerHTML=`<p>${q.q}</p>`+opts;
div.dataset.correct=JSON.stringify(q.correct);
c.appendChild(div);
});
}

function checkAnswers(){
let score=0;
document.querySelectorAll(".question").forEach(div=>{
let correct=JSON.parse(div.dataset.correct);
let inputs=div.querySelectorAll("input");
let selected=[];
inputs.forEach(i=>{if(i.checked) selected.push(parseInt(i.value));});

let ok=JSON.stringify(selected.sort())===JSON.stringify(correct.sort());

div.classList.remove("correct","wrong");

if(ok){score++; div.classList.add("correct");}
else{
div.classList.add("wrong");
inputs.forEach(i=>{
if(correct.includes(parseInt(i.value))){i.parentElement.style.background="#d4edda";}
});
}
});

document.getElementById("result").innerText=`Výsledok: ${score} / 15`;
}

render();
</script>

</body>
</html>
