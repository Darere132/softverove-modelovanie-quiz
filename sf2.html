<!DOCTYPE html>
<html lang="sk">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>UML Quiz 2 Full</title>

<style>
body { font-family: Arial, sans-serif; margin:20px; }
.question{
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;
}
.correct{ background:#d4edda; }
.wrong{ background:#f8d7da; }
label{
    display:block;
    margin:4px 0;
    padding:3px;
    border-radius:4px;
}
button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}
#result{
    font-size:18px;
    font-weight:bold;
    margin-top:20px;
}
</style>
</head>
<body>

<h2>UML Quiz 2 (45 otázok)</h2>

<div id="quiz"></div>
<button type="button" onclick="checkAnswers()">Vyhodnotiť</button>

<button type="button" onclick="location.href='index.html'">
    Späť na hlavnú stránku
</button>
<div id="result"></div>

<script>
const questions = [

{q:"1. Porovnanie atribútov a asociácií", options:["Atribút môžeme vyjadriť ako asociáciu","Atribút je vždy operácia","Atribút je diagram","Atribút je trieda"], correct:[0], multi:true},

{q:"2. Najjednoduchší štrukturálny vzťah medzi dvoma triedami sa nazýva?", options:["Asociácia","Dedičnosť","Agregácia","Kompozícia"], correct:[0], multi:true},

{q:"3. Hlavným dôvodom na vytvorenie abstraktnej triedy je:", options:["Možnosť tvorby subtried","Zmazanie kódu","Rýchlejšia databáza","Zníženie UML"], correct:[0], multi:true},

{q:"4. Diagramy tried je možné nakresliť z rôznych perspektív. Ktorá je najčastejšie používaná?", options:["Implementácia","Testovanie","Kompilácia","Architektúra HW"], correct:[0], multi:true},

{q:"5. Koncová (leaf) trieda:", options:["Nesmie mať žiadnych potomkov","Musí mať 1 potomka","Je abstraktná","Je interface"], correct:[0], multi:true},

{q:"6. Typovo-inštančná dichotómia vyjadruje, že:", options:["Na vzťahy medzi prvkami sa pozeráme z dvoch hladísk","Trieda má 2 atribúty","Objekt má 2 metódy","Existujú 2 diagramy"], correct:[0], multi:true},

{q:"7. Aký druh tried ešte poznáme?", options:["Typové triedy","Databázové triedy","UI triedy","Service triedy"], correct:[0], multi:true},

{q:"8. Rozdiel medzi operáciou a metódou?", options:["Operácia deklaruje čo objekt robí, metóda ako sa to urobí","Sú rovnaké","Metóda je atribút","Operácia je trieda"], correct:[0], multi:true},

{q:"9. Package diagram patrí medzi diagramy:", options:["štrukturálne diagramy","behaviorálne","testovacie","UI diagramy"], correct:[0], multi:true},

{q:"10. Medzi diferencované druhy tried patria: rozhrania, implementačné triedy ... . Nahraďte ... jednou z odpovedí. Vyberte jednu:", options:["Typové triedy","Databázové triedy","UI triedy","Service triedy"], correct:[0], multi:true},

{q:"11. Asociačná trieda je:", options:["Trieda pripojená k asociácii","Trieda, ktorá môže byť spojená aj s inou triedou","UI komponent","Databáza"], correct:[0,1], multi:true},

{q:"12. Interface sa zobrazuje:", options:["Prázdnym kolieskom s menom rozhrania","Ako normálnu triedu so stereotypom interface","Červeným trojuholníkom","Šípkou"], correct:[0,1], multi:true},

{q:"13. Zapúzdrenie znamená:", options:["Metódy sú ukryté za operáciami","Atribúty a operácie sú zapúzdrené v triede","Všetko je verejné","Bez tried"], correct:[0,1], multi:true},

{q:"14. Medzi štrukturálne črty triedy patria:", options:["Atribúty","Asociácie","Sekvencie","Správy"], correct:[0,1], multi:true},

{q:"15. Kvalifikátor slúži na:", options:["Redukuje násobnosť v asociácii","Zvyšuje kód","Maže triedy","Je diagram"], correct:[0], multi:true},

{q:"16. Vzťah trieda-objekt je ako vzťah správa-...", options:["Stimul","Event","Message","Signal"], correct:[0], multi:true},

{q:"17. N-árna asociácia:", options:["Vyjadruje vzťah min. troch tried","Je zobrazená prázdnym diamantom","Je medzi 2 triedami","Je dedičnosť"], correct:[0,1], multi:true},

{q:"18. Klasifikátory sú:", options:["Prvky, ktoré môžu mať inštancie","Nemajú inštancie","Len UI","Len DB"], correct:[0], multi:true},

{q:"19. Acyclic dependencies principle znamená:", options:["Závislosť medzi balíčkami musí byť acyklický graf","S cyklami","Random","UI pravidlo"], correct:[0], multi:true},

{q:"20. Subtyping je možné modelovať:", options:["Implementáciou rozhraní","Použitím dedičnosti","Len DB","Len UI"], correct:[0,1], multi:true},

{q:"21. Väzobný objekt je:", options:["Inštancia asociačnej triedy","Trieda","Metóda","Diagram"], correct:[0], multi:true},

{q:"22. Asociácia A a B:", options:["Plná čiara so šípkami na oboch koncoch","Plná čiara so šípkou pri B","Bez šípky","Cyklus"], correct:[0,1], multi:true},

{q:"23. Privátna viditeľnosť:", options:["-","+","#","~"], correct:[0], multi:true},

{q:"24. Diagramy tried môžeme nakresliť z rôznych perspektív. Ak sa pri modelovaní zameriame na rozhranie systému, používame perspektívu: Vyberte jednu:", options:["špecifikácia","implementácia","test","UI"], correct:[0], multi:true},

{q:"25. Odvodená vlastnosť triedy:", options:["Je vypočítaná na základe iných vlastností","Statická","UI","DB"], correct:[0], multi:true},

{q:"26. Dependency sa kreslí:", options:["čiarkovanou čiarou so šípkou","čiarkovanou čiarou so stereotypom use","plnou čiarou","blokom"], correct:[0,1], multi:true},

{q:"27. Kompozícia vs agregácia:", options:["Kompozícia je silnejší vzťah ako agregácia","Agregácia je silnejšia","Rovnaké","Neexistuje"], correct:[0], multi:true},

{q:"28. Realization sa kreslí:", options:["čiarkovanou čiarou so stereotypom realize","čiarkovanou čiarou s trojuholníkom","plnou čiarou","kruhom"], correct:[0,1], multi:true},

{q:"29. Interface má iba operácie:", options:["Pravda","Nepravda","Niekedy","Nikdy"], correct:[0], multi:true},

{q:"30. Diagram tried:", options:["Modelovanie slovníka pojmov systému","Statický pohľad na systém","Modelovanie spolupracujúcich tried","ani jedno"], correct:[0,1,2], multi:true},

{q:"31. Triedy popisujúce rolu v modeli:", options:["Typové triedy","UI triedy","DB","Service"], correct:[0], multi:true},

{q:"32. Klasifikátor je:", options:["Prvok UML, ktorý môže mať inštancie","Spoločné pomenovanie štrukturálnych vecí","UI komponent","DB tabuľka"], correct:[0,1], multi:true},

{q:"33. NEPATRÍ medzi princípy OOP:", options:["Realizácia","Dedičnosť","Zapúzdrenie","Polymorfizmus"], correct:[0], multi:true},

{q:"34. Pohľad z dvoch hladísk:", options:["Dichotómia","Trichotómia","Diagram","Model"], correct:[0], multi:true},

{q:"35. Súčasťou konceptuálneho modelu nie je:", options:["Jazyk OCL","Triedy","Vzťahy","Pravidlá"], correct:[0], multi:true},

{q:"36. Asociačná trieda:", options:["Bližšie popisuje asociáciu","Môže byť vo vzťahu aj s inými triedami","Len UI","Len DB"], correct:[0,1], multi:true},

{q:"37. Základné stavebné bloky UML tvoria:", options:["Veci, vzťahy a diagramy","Kód","UI","DB"], correct:[0], multi:true},

{q:"38. Klasifikátory patria medzi:", options:["Štrukturálne veci","Behaviorálne","UI","DB"], correct:[0], multi:true},

{q:"39. Doplnky:", options:["Patria medzi všeobecné mechanizmy UML","Kód","UI","DB"], correct:[0], multi:true},

{q:"40. Ak trieda požaduje rozhranie:", options:["Závislosť","Realizácia","Kompozícia","Agregácia"], correct:[0], multi:true},

{q:"41. Ak trieda poskytuje rozhranie, modelujeme to pomocou vzťahu:", options:["Realizácia","Závislosť","Kompozícia","Agregácia"], correct:[0], multi:true},

{q:"42. Väzba je:", options:["Inštanciou asociácie","Vzťah medzi objektami","Trieda","Diagram"], correct:[0,1], multi:true},

{q:"43. Správne poradie perspektív:", options:["Pojmová, špecifikácia, implementácia","Implementácia, pojmová, špecifikácia","UI, DB, HW","Náhodné"], correct:[0], multi:true},

{q:"44. Rozdiel abstraktná trieda vs rozhranie:", options:["ABS trieda môže mať atribúty a rozhranie nemôže","Obe sú rovnaké","Rozhranie má atribúty","Žiadny rozdiel"], correct:[0], multi:true},

{q:"45. Konceptuálny model UML tvorí:", options:["Základné stavebné bloky","Pravidlá","Všeobecné mechanizmy","Kód"], correct:[0,1,2], multi:true}

];

function shuffle(a){return a.sort(()=>Math.random()-0.5);}

function render(){
const c=document.getElementById("quiz");
c.innerHTML="";
shuffle(questions).forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";
let opts=shuffle(q.options.map((o,idx)=>({o,idx}))).map((opt)=>{
return `<label><input type='${q.multi?"checkbox":"radio"}' name='q${i}' value='${opt.idx}'> ${opt.o}</label>`;
}).join("");
div.innerHTML=`<p>${q.q}</p>`+opts;
div.dataset.correct=JSON.stringify(q.correct);
c.appendChild(div);
});
}

function checkAnswers(){
let score=0;
document.querySelectorAll(".question").forEach(div=>{
let correct=JSON.parse(div.dataset.correct);
let inputs=div.querySelectorAll("input");
let selected=[];
inputs.forEach(i=>{if(i.checked) selected.push(parseInt(i.value));});

let ok=JSON.stringify(selected.sort())===JSON.stringify(correct.sort());

div.classList.remove("correct","wrong");

if(ok){score++; div.classList.add("correct");}
else{
div.classList.add("wrong");
inputs.forEach(i=>{
if(correct.includes(parseInt(i.value))){i.parentElement.style.background="#d4edda";}
});
}
});

document.getElementById("result").innerText=`Výsledok: ${score} / 28`;
}

render();
</script>

</body>
</html>
